{% load static %}
<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}template_project{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <script src="{% static 'js/htmx.min.js' %}" defer></script>
  </head>
  <body class="flex min-h-full flex-col bg-white text-slate-900 antialiased">
    <a href="#main"
       class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:rounded focus:bg-white focus:px-3 focus:py-2 focus:outline-2 focus:outline-blue-700">
      Skip to main content
    </a>
    <header class="border-b border-slate-200">
      <nav aria-label="Primary" class="mx-auto w-full max-w-3xl p-4">
        <a href="/"
           class="font-semibold text-slate-900 hover:text-blue-800 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-700">
          template_project
        </a>
      </nav>
    </header>
    <main id="main" class="mx-auto w-full max-w-3xl grow p-4">
      {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-slate-200">
      <p class="mx-auto w-full max-w-3xl p-4 text-sm text-slate-600">
        Built from the Django application template.
      </p>
    </footer>
  </body>
</html>
