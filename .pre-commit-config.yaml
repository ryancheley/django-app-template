# Local hooks run by prek (uvx prek@<version>, pinned in the justfile).
# These mirror CI; CI remains the authoritative gate (constitution: Tooling).
#
# ruff and ty run through `uv run` so uv.lock is the single source of their
# versions — a Dependabot bump to the lockfile updates the hooks with no
# pinned mirror revs to keep in sync.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Vendored htmx must stay byte-identical to its recorded checksum, and
      # tailwind.css is generated output — exclude both from text fixers.
      - id: trailing-whitespace
        exclude: ^static/(js/htmx\.min\.js|css/tailwind\.css)$
      - id: end-of-file-fixer
        exclude: ^static/(js/htmx\.min\.js|css/tailwind\.css)$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (mirrors CI lint job)
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format (mirrors CI lint job)
        entry: uv run ruff format
        language: system
        types: [python]
      - id: ty
        name: ty type check (mirrors CI typecheck job)
        # --exit-zero-on-warning: the four documented Django false positives
        # are downgraded to warn in pyproject.toml and must not block.
        entry: uv run ty check --exit-zero-on-warning
        language: system
        types: [python]
        pass_filenames: false
      - id: zizmor
        name: zizmor workflow audit (mirrors CI zizmor job)
        entry: uvx zizmor@1.26.1 --persona regular
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
