# Reference production stack: gunicorn + whitenoise, DEBUG off, no bind
# mounts. Same image stages as dev — configuration differs, layers do not.
# This is a reference, not a deploy pipeline (spec: out of scope).
#
# Migrations are an explicit operator action in production:
#   docker compose -f compose.prod.yaml run --rm web python manage.py migrate
name: template_project-prod

services:
  web:
    build:
      context: .
      target: runtime
    image: template_project-web:prod
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file: .env
    environment:
      DEBUG: "false"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18
    env_file: .env
    volumes:
      # Postgres 18+ images expect the mount at /var/lib/postgresql (not
      # .../data) so pg_upgrade --link works across major upgrades.
      - postgres_data_prod:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-template_project}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data_prod:
