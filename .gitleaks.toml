# gitleaks configuration.
#
# No allowlist entries exist yet — gitleaks rejects an empty [allowlist]
# table, so the pattern is documented here instead. When a project genuinely
# needs an exception (a documented test fixture, a sample key), add the
# narrowest possible rule WITH a justification comment, e.g.:
#
#   [allowlist]
#   description = "Why this exception is safe"
#   paths = ['''tests/fixtures/sample\.pem''']

[extend]
useDefault = true
