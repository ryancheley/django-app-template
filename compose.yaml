# Development stack: runserver with live reload + Postgres.
# Rewritten to the real project name by scripts/instantiate.py.
name: template_project

services:
  web:
    build:
      context: .
      target: dev
    image: template_project-web:dev
    # Dev applies migrations before serving; in production this is an
    # explicit operator action (see compose.prod.yaml).
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      # Keep the image's venv; never shadow it with a host directory.
      - /app/.venv
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host port 5433 (not 5432) so host-side pytest reaches this database
    # without colliding with a locally installed Postgres. Override with
    # POSTGRES_HOST_PORT when several template-derived projects run at once.
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-template_project}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
